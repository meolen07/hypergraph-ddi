# SYNTHETIC DEMO — smoke tests only. Not for publication.
project_root: .
seed: 42
device: cpu

data:
  root: data
  source: synthetic_demo  # synthetic_demo | drugbank | twosides
  n_drugs: 50
  n_hyperedges: 80
  max_hyperedge_size: 4
  train_ratio: 0.7
  val_ratio: 0.15
  neg_per_pos: 1

model:
  name: hgnn  # hgnn | mlp | gcn | gat | graphsage
  in_dim: 64
  hidden_dim: 128
  out_dim: 64
  n_layers: 2
  use_attention: false
  dropout: 0.1

training:
  lr: 0.001
  weight_decay: 0.00001
  epochs: 30
  batch_size: 64
  early_stopping_patience: 8
  grad_clip: 1.0
  monitor_metric: roc_auc
  num_workers: 0

experiment:
  name: demo_hgnn
  output_dir: experiments
