# TWOSIDES + GCN baseline — place twosides.csv under data/raw/
project_root: .
seed: 42
device: cuda

data:
  root: data
  source: twosides
  twosides_csv: ./data/raw/twosides.csv
  drug_a_col: drug1_name
  drug_b_col: drug2_name
  train_ratio: 0.7
  val_ratio: 0.15
  neg_per_pos: 1

model:
  name: gcn
  in_dim: 64
  hidden_dim: 128
  out_dim: 64
  n_layers: 2
  dropout: 0.1

training:
  lr: 0.001
  weight_decay: 0.00001
  epochs: 80
  batch_size: 512
  early_stopping_patience: 12

experiment:
  name: twosides_gcn
  output_dir: experiments
